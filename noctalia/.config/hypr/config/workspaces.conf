# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

workspace = 1, persistent:true, layout:master
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

# Ignore maximize requests from apps
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/

windowrule {
  name = float-w2
  match:workspace = 2
  float = on
  center = on
  size = (monitor_w*0.7) (monitor_h*0.75)
}

windowrule {
  name = group-firefox
  workspace = 2
  group = set
  tile = on
  match:class = org.mozilla.firefox
}

windowrule {
  name = bar-group-firefox
  group = barred
  match:workspace = 2
  match:class = negative:org.mozilla.firefox
}

windowrule {
  name = obsidian-w3
  workspace = 3
  match:class = ^(obsidian)$
}

windowrule {
  name = zotero-w3
  workspace = 3
  match:class = org.zotero.Zotero$
}

# Zotero Windows
windowrule = float on, stay_focused on, maximize on, match:class org.zotero.Zotero, match:title Quick Format Citation
windowrule = float on, match:class org.zotero.Zotero, match:title Zotero Settings

windowrule {
  name = teams-w5
  workspace = 5
  match:class = chrome-cifhbcnohmdccbgoicgdjpfamggdegmo-Default
}

windowrule {
  name = discord-w5
  workspace = 5
  match:class = chrome-pliiebkcmokkgndfalahlmimanmbjlab-Default
}

# TODO: should find a tool to save layouts

# ssh askpass window less ugly
# windowrule = float on, center on, size 500 100, match:class lxqt-openssh-askpass
windowrule = float on, center on, match:class Zenity

layerrule = no_anim on, match:namespace selection
