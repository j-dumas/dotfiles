source = $HOME/.config/hypr/mocha.conf

$accent = $sapphire
$font = JetBrainsMono Nerd Font

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

# BACKGROUND
background {
    monitor =
    path = ~/Pictures/wallpaper/tovehobbit.jpg
    blur_passes = 2
    color = $base
}

# TIME
label {
    monitor = eDP-1
    text = cmd[update:30000] echo "$(date +"%R")"
    color = $text
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
    shadow_passes = 3
    shadow_size = 5
}

# DATE 
label {
    monitor = eDP-1
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $text
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
    shadow_passes = 3
    shadow_size = 4
}

# BATTERY
label {
    monitor = eDP-1
    text = cmd[update:10000] echo "$(upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep percentage | awk '{ print $2 }')"
    color = $text
    font_size = 18
    font_family = $font
    position = -30, -200
    halign = right
    valign = top
    shadow_passes = 3
    shadow_size = 4
}

# INPUT FIELD
input-field {
    monitor = eDP-1
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $surface0
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##$tealAlpha"><i>󰌾 </i></span><span foreground="##$textAlpha">$USER</span>
    hide_input = false
    check_color = $accent
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $maroon
    position = 0, -35
    halign = center
    valign = center
}
